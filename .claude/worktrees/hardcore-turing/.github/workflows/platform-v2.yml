name: platform-v2-sandbox

on:
  push:
    branches: [main, platform-v2]
  pull_request:
    branches: [main]

jobs:
  platform-v2:
    name: Platform v2 Verification (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Run verify-v2
        run: |
          mkdir -p logs
          just verify-v2 | tee logs/verify_v2_phase_2_1_linux.log

      - name: Run sandbox-tests-v2
        run: |
          mkdir -p logs
          just sandbox-tests-v2 | tee logs/sandbox_tests_v2_linux.log

      - name: Upload Linux platform-v2 logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: platform-v2-linux-logs
          path: |
            logs/verify_v2_phase_2_1_linux.log
            logs/sandbox_tests_v2_linux.log
          if-no-files-found: ignore
