[package]
name = "safeagent-worker"
version = "0.1.0"
edition = "2021"

[workspace]
members = ["."]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"
ed25519-dalek = "2"
rand = "0.8"
dashmap = "5"
libc = "0.2"
axum = "0.7"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "net"] }
hyper = "1"
hyper-util = { version = "0.1", features = ["tokio"] }
hyper-rustls = "0.27"
tokio-rustls = "0.26"
rustls = "0.23"
rustls-pemfile = "2"
http-body-util = "0.1"
hex = "0.4"
uuid = { version = "1", features = ["v4"] }

safeagent-shared-proto = { path = "../shared/shared-proto" }
safeagent-shared-identity = { path = "../shared/shared-identity" }
safeagent-shared-errors = { path = "../shared/shared-errors" }
