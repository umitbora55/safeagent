app = "safeagent"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 18789
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[env]
  RUST_LOG = "info"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
