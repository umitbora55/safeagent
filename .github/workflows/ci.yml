name: CI

on:
  push:
    branches: [main, platform-v2]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Quick checks run in parallel for fast feedback
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # VERIFY GATE - Single source of truth for all verification
  # This job MUST pass for any PR to be merged.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  verify-gate:
    name: Verify Gate (Required)
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Start OTLP Collector
        run: just otel-up

      - name: Run Verify Gate
        run: just ci-verify

      - name: Stop OTLP Collector
        if: always()
        run: just otel-down

      - name: Verify Gate Summary
        run: |
          echo "## Verify Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Format | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY
          echo "| Clippy | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY
          echo "| Policy Conformance | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY
          echo "| STRIDE Generation | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY
          echo "| Red Team | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY
          echo "| Chaos | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY
          echo "| Audit Verify | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY
          echo "| OTEL Smoke | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY

  # Security audit (informational)
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Build release binaries (only after verify-gate passes)
  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [verify-gate]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --release
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: safeagent-binaries
          path: |
            target/release/safeagent
            target/release/audit-verify
            target/release/red-team-harness
            target/release/chaos-harness
            target/release/policy-conformance-runner
            target/release/stride-testgen
          if-no-files-found: ignore
