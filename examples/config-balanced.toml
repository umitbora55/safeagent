# SafeAgent — Balanced Configuration (Default)
# Routes each request to the best cost/quality model.
# Best for: general-purpose usage, mixed workloads.

[router]
mode = "balanced"
confidence_preset = "balanced"

[cache]
enabled = true

[policy]
daily_limit_usd = 10.0
monthly_limit_usd = 100.0

[logging]
level = "info"
theme = "dark"
