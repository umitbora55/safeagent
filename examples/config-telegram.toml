# SafeAgent — Telegram-Only Configuration
# Optimized for mobile chat usage via Telegram.
# Best for: on-the-go access, quick answers from your phone.

[router]
mode = "balanced"
confidence_preset = "balanced"

[cache]
enabled = true

[policy]
daily_limit_usd = 10.0
monthly_limit_usd = 100.0

[logging]
level = "warn"
theme = "dark"
