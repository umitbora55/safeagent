# SafeAgent STRIDE Threat Model
# Machine-readable format for automated test generation
#
# STRIDE Categories:
# S - Spoofing (identity)
# T - Tampering (data integrity)
# R - Repudiation (deniability)
# I - Information Disclosure
# D - Denial of Service
# E - Elevation of Privilege

version: "1.0"
generated: "2026-02-24"
system: "SafeAgent AI Assistant"

threats:
  # ═══════════════════════════════════════════════════════════════════════════
  # SPOOFING THREATS
  # ═══════════════════════════════════════════════════════════════════════════

  - id: "S-001"
    category: "Spoofing"
    title: "Capability token forgery"
    description: "Attacker attempts to forge a capability token to bypass authorization"
    component: "capability-tokens"
    assets: ["skill execution", "user identity"]
    likelihood: "medium"
    impact: "high"
    mitigations:
      - "Ed25519 signatures (PASETO v4.public)"
      - "Server-side key management"
    test_templates:
      red_team:
        - action: "forge_token"
          input: "modified_payload_with_fake_signature"
          expected: "verification_failed"
      chaos:
        - fault: "key_rotation_during_verification"
          expected: "graceful_rejection"

  - id: "S-002"
    category: "Spoofing"
    title: "Session impersonation"
    description: "Attacker replays a valid token to impersonate another user"
    component: "capability-tokens"
    assets: ["user session", "audit trail"]
    likelihood: "medium"
    impact: "high"
    mitigations:
      - "Nonce-based replay prevention"
      - "Token TTL (max 5 minutes)"
    test_templates:
      red_team:
        - action: "replay_token"
          input: "previously_used_valid_token"
          expected: "replay_detected"
      chaos:
        - fault: "nonce_cache_memory_pressure"
          expected: "conservative_rejection"

